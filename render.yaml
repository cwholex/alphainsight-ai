services:
  - type: web
    name: alphainsight-ai
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm install && npx prisma migrate deploy && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: KIMI_API_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: BRAVE_SEARCH_KEY
        sync: false
      - key: NEWSAPI_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: INITIAL_CAPITAL
        value: "1000000"
      - key: NEXT_PUBLIC_APP_URL
        value: "https://alphainsight-ai.onrender.com"
    healthCheckPath: /api/health
